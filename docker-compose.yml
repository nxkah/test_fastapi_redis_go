services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  redis_insight:
    image: redis/redisinsight:latest
    container_name: redis_insight
    restart: always
    ports:
      - "5540:5540"
    depends_on:
      - redis

  fastapi:
    build: .
    container_name: fastapi
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    container_name: fastapi_worker
    command: python result_worker.py
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  go_worker:
    build:
      context: ./go_worker
    container_name: go_worker
    restart: always
    environment:
      REDIS_ADDR: redis:6379
      TASKS_QUEUE: tasks_queue
      RESULTS_QUEUE: results_queue
      HEALTH_PORT: 8081
      REDIS_CONNECT_ATTEMPTS: 20
      REDIS_CONNECT_DELAY_SEC: 2
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  postgres_data: